services:
  searxng:
    image: searxng/searxng:latest
    networks:
      - internal
    volumes:
      - ./data/searxng:/etc/searxng
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ ! -f /etc/searxng/settings.yml ]; then
          cat > /etc/searxng/settings.yml <<SETTINGS
        use_default_settings: true
        server:
          secret_key: "$$(head -c 24 /dev/urandom | base64 | tr -dc 'a-zA-Z0-9')"
        search:
          formats:
            - json
        SETTINGS
        fi
        exec /usr/local/searxng/.venv/bin/granian searx.webapp:app
    restart: unless-stopped

  mcp-web:
    build:
      context: ./packages/mcp-web-py
      dockerfile: Dockerfile
    networks:
      - internal
    environment:
      PORT: 3002
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng:8080}
      SEARXNG_KEY: ${SEARXNG_KEY:-}
    restart: unless-stopped

  mcp-rag:
    build:
      context: ./packages/mcp-rag
      dockerfile: Dockerfile
    networks:
      - internal
    environment:
      PORT: 3003
      DATA_DIR: /data/docs
      DB_DIR: /data/chromadb
    volumes:
      - ./rag:/data/docs:ro
      - ./data/mcp-rag/chromadb:/data/chromadb
    restart: unless-stopped

  kbbot:
    build:
      context: .
      dockerfile: packages/kbbot/Dockerfile
    networks:
      - internal
    environment:
      NETWORK: ${KBBOT_NETWORK:-testnet}
      BOT_NAMETAG: ${KBBOT_NAMETAG:-kbbot}
      KBBOT_LLM_API_KEY: ${KBBOT_LLM_API_KEY}
      KBBOT_LLM_MODEL: ${KBBOT_LLM_MODEL:-gemini-3-flash-preview}
      KBBOT_LLM_BASE_URL: ${KBBOT_LLM_BASE_URL:-}
      MCP_RAG_URL: http://mcp-rag:3003/mcp
      MCP_WEB_URL: http://mcp-web:3002/mcp
      DATA_DIR: /app/data
      TOKENS_DIR: /app/tokens
      MAX_HISTORY_MESSAGES: ${KBBOT_MAX_HISTORY_MESSAGES:-20}
      TRUSTBASE_PATH: /app/trustbase-testnet.json
      ORACLE_DEBUG: ${ORACLE_DEBUG:-true}
    volumes:
      - ./data/kbbot/data:/app/data
      - ./data/kbbot/tokens:/app/tokens
    depends_on:
      mcp-rag:
        condition: service_started
      mcp-web:
        condition: service_started
    restart: unless-stopped

  viktor:
    build:
      context: .
      dockerfile: packages/viktor/Dockerfile
    networks:
      - internal
    environment:
      NETWORK: ${VIKTOR_NETWORK:-testnet}
      BOT_NAMETAG: ${VIKTOR_NAMETAG:-viktor}
      VIKTOR_LLM_API_KEY: ${VIKTOR_LLM_API_KEY:-}
      VIKTOR_LLM_MODEL: ${VIKTOR_LLM_MODEL:-gpt-oss}
      VIKTOR_LLM_BASE_URL: ${VIKTOR_LLM_BASE_URL:-}
      MCP_RAG_URL: http://mcp-rag:3003/mcp
      MCP_WEB_URL: http://mcp-web:3002/mcp
      DATA_DIR: /app/data
      TOKENS_DIR: /app/tokens
    volumes:
      - ./data/viktor/data:/app/data
      - ./data/viktor/tokens:/app/tokens
    depends_on:
      mcp-rag:
        condition: service_started
      mcp-web:
        condition: service_started
    restart: unless-stopped

  chess-bot:
    build:
      context: .
      dockerfile: packages/chess-bot/Dockerfile
    networks:
      - internal
    environment:
      NETWORK: ${CHESS_BOT_NETWORK:-testnet}
      BOT_NAMETAG: ${CHESS_BOT_NAMETAG:-chess-bot}
      UCT_COIN_ID: ${UCT_COIN_ID:-}
      UCT_DECIMALS: ${UCT_DECIMALS:-18}
      MAX_CONCURRENT_GAMES: ${MAX_CONCURRENT_GAMES:-10}
      GROUP_ID: ${CHESS_BOT_GROUP_ID:-chess}
      DATA_DIR: /app/data
      TOKENS_DIR: /app/tokens
    volumes:
      - ./data/chess-bot/data:/app/data
      - ./data/chess-bot/tokens:/app/tokens
    restart: unless-stopped

  unicity-l3:
    build:
      context: .
      dockerfile: packages/unicity-l3/Dockerfile
    networks:
      - internal
    environment:
      NETWORK: ${L3_NETWORK:-testnet}
      BOT_NAMETAG: ${L3_NAMETAG:-unicity-l3}
      AGGREGATOR_URL: ${L3_AGGREGATOR_URL:-https://goggregator-test.unicity.network/}
      EXPLORER_BASE_URL: ${L3_EXPLORER_BASE_URL:-https://unicitynetwork.github.io/smt-explorer/}
      GROUP_ID: ${L3_GROUP_ID}
      POLL_INTERVAL_MS: ${L3_POLL_INTERVAL_MS:-1500}
      SHOW_EMPTY_BLOCKS: ${L3_SHOW_EMPTY_BLOCKS:-false}
      DATA_DIR: /app/data
      TOKENS_DIR: /app/tokens
    volumes:
      - ./data/unicity-l3/data:/app/data
      - ./data/unicity-l3/tokens:/app/tokens
    restart: unless-stopped

networks:
  internal:
    driver: bridge

